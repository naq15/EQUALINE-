<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EQUALINE | Kalkulator SPLDV Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            color: #f3f4f6; 
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-box { 
            background-color: rgba(15, 23, 42, 0.6); 
            border: 1px solid #475569; 
            color: white; 
            border-radius: 0.5rem; 
            padding: 0.6rem; 
            width: 100%; 
            outline: none; 
            transition: all 0.3s ease; 
        }
        .input-box:focus { 
            border-color: #3b82f6; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }
        /* Custom Scrollbar for Card Content */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col items-center">

    <div class="max-w-5xl w-full text-center mb-10 mt-4">
        <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 tracking-wider mb-2 drop-shadow-lg">
            EQUALINE
        </h1>
        <p class="text-gray-300 text-lg font-medium tracking-wide">Kalkulator Sistem Persamaan Linear Dua Variabel</p>
        <div class="h-1 w-32 bg-gradient-to-r from-blue-500 to-purple-500 mx-auto mt-4 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.6)]"></div>
    </div>

    <div class="max-w-6xl w-full grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="glass-panel p-6 rounded-2xl shadow-xl transition transform hover:-translate-y-1 duration-300">
            <h2 class="text-xl font-bold mb-5 flex items-center text-blue-400">
                <div class="w-8 h-8 rounded-full bg-blue-500/20 flex items-center justify-center mr-3">1</div>
                Persamaan 1
            </h2>
            <div class="space-y-4">
                <div><label class="text-sm text-gray-300 font-medium">Koefisien x</label><input type="number" id="a1" value="2" class="input-box mt-1"></div>
                <div><label class="text-sm text-gray-300 font-medium">Koefisien y</label><input type="number" id="b1" value="3" class="input-box mt-1"></div>
                <div><label class="text-sm text-gray-300 font-medium">Konstanta</label><input type="number" id="c1" value="12" class="input-box mt-1"></div>
            </div>
        </div>

        <div class="glass-panel p-6 rounded-2xl shadow-xl transition transform hover:-translate-y-1 duration-300">
            <h2 class="text-xl font-bold mb-5 flex items-center text-rose-400">
                <div class="w-8 h-8 rounded-full bg-rose-500/20 flex items-center justify-center mr-3">2</div>
                Persamaan 2
            </h2>
            <div class="space-y-4">
                <div><label class="text-sm text-gray-300 font-medium">Koefisien x</label><input type="number" id="a2" value="1" class="input-box mt-1"></div>
                <div><label class="text-sm text-gray-300 font-medium">Koefisien y</label><input type="number" id="b2" value="-1" class="input-box mt-1"></div>
                <div><label class="text-sm text-gray-300 font-medium">Konstanta</label><input type="number" id="c2" value="1" class="input-box mt-1"></div>
            </div>
        </div>

        <div class="glass-panel p-6 rounded-2xl shadow-xl flex flex-col justify-center border-t-4 border-t-purple-500">
            <label class="text-sm text-gray-300 font-medium mb-3">Pilih Metode Penyelesaian:</label>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <label class="cursor-pointer">
                    <input type="radio" name="metode" value="1" class="peer hidden">
                    <div class="peer-checked:bg-blue-600/50 peer-checked:border-blue-400 peer-checked:text-white bg-slate-800/50 border border-slate-600 text-gray-400 rounded-xl p-3 text-center transition-all hover:bg-slate-700/50">
                        <div class="font-semibold text-sm">Substitusi</div>
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="metode" value="2" class="peer hidden">
                    <div class="peer-checked:bg-rose-600/50 peer-checked:border-rose-400 peer-checked:text-white bg-slate-800/50 border border-slate-600 text-gray-400 rounded-xl p-3 text-center transition-all hover:bg-slate-700/50">
                        <div class="font-semibold text-sm">Eliminasi</div>
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="metode" value="3" class="peer hidden">
                    <div class="peer-checked:bg-purple-600/50 peer-checked:border-purple-400 peer-checked:text-white bg-slate-800/50 border border-slate-600 text-gray-400 rounded-xl p-3 text-center transition-all hover:bg-slate-700/50">
                        <div class="font-semibold text-sm">Campuran</div>
                    </div>
                </label>
                <label class="cursor-pointer">
                    <input type="radio" name="metode" value="4" class="peer hidden" checked>
                    <div class="peer-checked:bg-emerald-600/50 peer-checked:border-emerald-400 peer-checked:text-white bg-slate-800/50 border border-slate-600 text-gray-400 rounded-xl p-3 text-center transition-all hover:bg-slate-700/50">
                        <div class="font-semibold text-sm">Grafik</div>
                    </div>
                </label>
            </div>
            
            <button onclick="jalankanKalkulator()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-4 px-6 rounded-xl shadow-[0_0_15px_rgba(99,102,241,0.5)] transition-all transform hover:scale-105 active:scale-95">
                Hitung Solusi! <i class="fas fa-rocket ml-2"></i>
            </button>
        </div>
    </div>

    <div id="hasil-container" class="max-w-6xl w-full mt-10 hidden flex-col lg:flex-row gap-6 animate-fade-in">
        
        <div id="step-container" class="flex-1 flex flex-col gap-4">
            </div>

        <div id="grafik-box" class="glass-panel p-5 rounded-2xl shadow-2xl flex-1 hidden flex-col relative">
            <h3 class="text-center font-bold text-gray-200 mb-2 tracking-wide flex justify-center items-center">
                <i class="fas fa-chart-line mr-2 text-blue-400"></i> Visualisasi Grafik
            </h3>
            <div class="text-center text-xs text-gray-400 mb-2">
                <i class="fas fa-mouse mr-1"></i> Scroll untuk Zoom | Klik & Geser untuk Pan
                <button onclick="resetZoom()" class="ml-2 px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded text-gray-200 transition">Reset View</button>
            </div>
            <div class="relative w-full flex-1 min-h-[400px]">
                <canvas id="grafikCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;
        
        // State management untuk sistem Step-by-Step UI
        let stepList = [];
        let currentStepIndex = -1;

        function resetZoom() {
            if (myChart) {
                myChart.resetZoom();
            }
        }

        // ----- SISTEM UI STEP-BY-STEP BARU -----
        function resetSteps() {
            stepList = [];
            currentStepIndex = -1;
        }

        function buatStep(judul, bgClass, textClass) {
            stepList.push({ judul, bgClass, textClass, konten: "" });
            currentStepIndex++;
        }

        function out(teks = "") {
            if (currentStepIndex >= 0) {
                stepList[currentStepIndex].konten += teks + "\n";
            }
        }

        function renderSteps() {
            let container = document.getElementById('step-container');
            container.innerHTML = "";
            
            stepList.forEach(step => {
                let card = document.createElement('div');
                // Styling mirip dengan referensi gambar
                card.className = "flex flex-col border border-gray-700 rounded-xl overflow-hidden shadow-lg bg-[#222222]";
                
                let header = document.createElement('div');
                header.className = `${step.bgClass} px-4 py-2 text-sm font-bold tracking-wide`;
                header.innerHTML = step.judul;
                
                let body = document.createElement('div');
                body.className = "p-4 overflow-x-auto";
                
                let pre = document.createElement('pre');
                pre.className = `font-mono text-sm whitespace-pre ${step.textClass}`;
                pre.innerHTML = step.konten.trimEnd(); // Bersihkan enter berlebih di akhir
                
                body.appendChild(pre);
                card.appendChild(header);
                card.appendChild(body);
                container.appendChild(card);
            });
        }

        // ----- UTILITAS MATEMATIKA -----
        function format_angka(angka) {
            return Number.isInteger(angka) ? angka : parseFloat(angka.toFixed(4));
        }

        function gcd_int(a, b) {
            a = Math.abs(a); b = Math.abs(b);
            while(b) { let t = b; b = a % b; a = t; }
            return a;
        }

        function bentuk_pecahan(num, den) {
            let mult = 1;
            while((num % 1 !== 0 || den % 1 !== 0) && mult <= 100000) {
                num *= 10; den *= 10; mult *= 10;
            }
            num = Math.round(num); den = Math.round(den);

            if (den === 0) return "Tak Terdefinisi";
            if (num === 0) return "0";
            
            let isNegative = (num < 0) ^ (den < 0);
            num = Math.abs(num); den = Math.abs(den);
            
            let fpb = gcd_int(num, den);
            num /= fpb; den /= fpb;
            
            let sign = isNegative ? "-" : "";
            if (den === 1) return `${sign}${num}`;
            return `${sign}${num}/${den}`;
        }

        function cetak_HP(a1, b1, c1, a2, b2, c2) {
            buatStep("HIMPUNAN PENYELESAIAN (HP)", "bg-[#ddac64] text-black", "text-[#ddac64]");
            let D = a1 * b2 - a2 * b1;
            let Dx = c1 * b2 - c2 * b1;
            let Dy = a1 * c2 - a2 * c1;
            let str_x = bentuk_pecahan(Dx, D);
            let str_y = bentuk_pecahan(Dy, D);
            out(`Didapatkan hasil akhir:`);
            out(`x = ${str_x}`);
            out(`y = ${str_y}`);
            out(`\n✨ HP = { (${str_x}, ${str_y}) } ✨`);
        }

        function percantik(teks) {
            teks = String(teks);
            teks = teks.replace(/(?<![\d\.])-1x\b/g, '-x');
            teks = teks.replace(/(?<![\d\.])-1y\b/g, '-y');
            teks = teks.replace(/(?<![\d\.])1x\b/g, 'x');
            teks = teks.replace(/(?<![\d\.])1y\b/g, 'y');
            teks = teks.replace(/\+ -/g, "- ");
            teks = teks.replace(/- -/g, "+ ");
            teks = teks.replace(/\( -/g, "(-");
            return teks.trim();
        }

        function cetak_persamaan(a, b, c, no) {
            let tanda_b = b >= 0 ? "+" : "-";
            let teks = `${a}x ${tanda_b} ${Math.abs(b)}y = ${c}`;
            out(`Persamaan ${no}: ${percantik(teks)}`);
        }

        function hitung_lebar(...teksArr) {
            return Math.max(...teksArr.map(t => percantik(String(t)).length));
        }

        function cetak_baris(kiri, kanan, lebar) {
            let k_rapi = percantik(kiri);
            let kan_rapi = percantik(kanan);
            out(`      ${k_rapi.padStart(lebar, ' ')} = ${kan_rapi}`);
        }

        function cetak_eliminasi_sejajar(kiri1, kanan1, kiri2, kanan2, operator="(-)", ekstra=0) {
            let kr1 = percantik(kiri1), kn1 = percantik(kanan1);
            let kr2 = percantik(kiri2), kn2 = percantik(kanan2);
            let lebar_k = Math.max(kr1.length, kr2.length);
            
            out(`   ${kr1.padStart(lebar_k, ' ')} = ${kn1}`);
            out(`   ${kr2.padStart(lebar_k, ' ')} = ${kn2}`);
            let panjang_garis = lebar_k + 3 + Math.max(kn1.length, kn2.length) + ekstra;
            out("   " + "─".repeat(panjang_garis) + ` ${operator}\n`);
        }

        function cetak_pecahan_sejajar(kiri, pembilang, penyebut, lebar) {
            let atas = percantik(String(pembilang));
            let bawah = percantik(String(penyebut));
            let panjang_garis = Math.max(atas.length, bawah.length) + 2;
            let centerStr = (str, len) => str.padStart(str.length + Math.floor((len - str.length) / 2), ' ').padEnd(len, ' ');
            
            out(`      ${" ".repeat(lebar)}   ${centerStr(atas, panjang_garis)}`);
            out(`      ${percantik(String(kiri)).padStart(lebar, ' ')} = ${"─".repeat(panjang_garis)}`);
            out(`      ${" ".repeat(lebar)}   ${centerStr(bawah, panjang_garis)}`);
        }

        // ================= METODE SUBSTITUSI =================
        function metode_substitusi(a1, b1, c1, a2, b2, c2) {
            buatStep("1. UBAH PERSAMAAN UNTUK MENCARI 'x'", "bg-[#6aa4e0] text-black", "text-[#6aa4e0]");
            let teks_l1 = `${a1}x = ${c1} - (${b1}y)`;
            out(`   ${percantik(teks_l1)}`);
            
            let L_x = hitung_lebar("x");
            cetak_pecahan_sejajar("x", `${c1} - (${b1}y)`, a1, L_x); 
            
            buatStep("2. SUBSTITUSI 'x' KE PERSAMAAN 2", "bg-[#b876d6] text-black", "text-[#b876d6]");
            let tanda_b2_asli = b2 >= 0 ? "+" : "-";
            let teks_pers_2 = percantik(`${a2} [ (${c1} - ${b1}y) / ${a1} ] ${tanda_b2_asli} ${Math.abs(b2)}y = ${c2}`);
            out(`   ${teks_pers_2}`);
            
            let garis_bantu = "-".repeat(teks_pers_2.length);
            out(`   ${garis_bantu} (× ${a1})\n`);
            
            let k_b2 = format_angka(a1 * b2), k_c2 = format_angka(a1 * c2);
            let tanda_k_b2 = k_b2 >= 0 ? "+" : "-";
            let dist_c = format_angka(a2 * c1), dist_y = format_angka(a2 * b1);
            let tanda_dist_y = dist_y >= 0 ? "-" : "+";
            
            let y_kiri = format_angka(k_b2 - dist_y);
            let sisa_c = format_angka(k_c2 - dist_c);
            
            let k1 = `${a2}(${c1} - ${b1}y) ${tanda_k_b2} ${Math.abs(k_b2)}y`;
            let k2 = `${dist_c} ${tanda_dist_y} ${Math.abs(dist_y)}y ${tanda_k_b2} ${Math.abs(k_b2)}y`;
            let k3 = `${tanda_dist_y} ${Math.abs(dist_y)}y ${tanda_k_b2} ${Math.abs(k_b2)}y`;
            let k4 = `${y_kiri}y`;
            
            let L = hitung_lebar(k1, k2, k3, k4, "y");
            
            cetak_baris(k1, `${k_c2}`, L);
            cetak_baris(k2, `${k_c2}`, L);
            cetak_baris(k3, `${k_c2} - ${dist_c}`, L);
            cetak_baris(k4, `${sisa_c}`, L);
            cetak_pecahan_sejajar("y", sisa_c, y_kiri, L);
            
            let pecahan_y = bentuk_pecahan(sisa_c, y_kiri);
            cetak_baris("y", `${pecahan_y}`, L);
            
            buatStep("3. SUBSTITUSI 'y' UNTUK MENCARI 'x'", "bg-[#df6e77] text-black", "text-[#df6e77]");
            let L2 = hitung_lebar("x"); 
            cetak_pecahan_sejajar("x", `${c1} - (${b1} × (${pecahan_y}))`, a1, L2);
            
            let hasil_kali_y_num = b1 * sisa_c;
            let hasil_kali_y_den = y_kiri;
            let sisa_atas_num = c1 * hasil_kali_y_den - hasil_kali_y_num;
            let sisa_atas_den = hasil_kali_y_den;
            let val_x_num = sisa_atas_num;
            let val_x_den = sisa_atas_den * a1;
            
            let pecahan_x = bentuk_pecahan(val_x_num, val_x_den);
            cetak_baris("x", `${pecahan_x}`, L2);
            
            cetak_HP(a1, b1, c1, a2, b2, c2);
        }

        // ================= METODE ELIMINASI =================
        function metode_eliminasi(a1, b1, c1, a2, b2, c2) {
            buatStep("1. ELIMINASI VARIABEL X (Mencari nilai y)", "bg-[#6aa4e0] text-black", "text-[#6aa4e0]");
            let tanda_b1 = b1 >= 0 ? "+" : "-";
            let tanda_b2 = b2 >= 0 ? "+" : "-";
            let kiri_p1 = percantik(`${a1}x ${tanda_b1} ${Math.abs(b1)}y`);
            let kiri_p2 = percantik(`${a2}x ${tanda_b2} ${Math.abs(b2)}y`);
            
            let L_awal = Math.max(kiri_p1.length, kiri_p2.length);
            let p1_rata = `${kiri_p1.padStart(L_awal, ' ')} = ${c1}`;
            let p2_rata = `${kiri_p2.padStart(L_awal, ' ')} = ${c2}`;
            let panjang_maks = Math.max(p1_rata.length, p2_rata.length);

            out(`   ${p1_rata.padEnd(panjang_maks, ' ')} | × ${Math.abs(a2)}`);
            out(`   ${p2_rata.padEnd(panjang_maks, ' ')} | × ${Math.abs(a1)}`);
            out("   " + "─".repeat(panjang_maks + 10));
            
            let p1_a = format_angka(a1*Math.abs(a2)), p1_b = format_angka(b1*Math.abs(a2)), p1_c = format_angka(c1*Math.abs(a2));
            let p2_a = format_angka(a2*Math.abs(a1)), p2_b = format_angka(b2*Math.abs(a1)), p2_c = format_angka(c2*Math.abs(a1));
            
            let operator1 = (p1_a === p2_a) ? "(-)" : "(+)";
            cetak_eliminasi_sejajar(`${p1_a}x ${p1_b >= 0 ? "+" : "-"} ${Math.abs(p1_b)}y`, p1_c, `${p2_a}x ${p2_b >= 0 ? "+" : "-"} ${Math.abs(p2_b)}y`, p2_c, operator1);
            
            let sisa_b = (p1_a === p2_a) ? p1_b - p2_b : p1_b + p2_b;
            let sisa_c = (p1_a === p2_a) ? p1_c - p2_c : p1_c + p2_c;
            
            let k1 = `${format_angka(sisa_b)}y`;
            let L1 = hitung_lebar(k1, "y"); 
            
            cetak_baris(k1, `${format_angka(sisa_c)}`, L1);
            cetak_pecahan_sejajar("y", format_angka(sisa_c), format_angka(sisa_b), L1);
            cetak_baris("y", `${bentuk_pecahan(sisa_c, sisa_b)}`, L1);
            
            buatStep("2. ELIMINASI VARIABEL Y (Mencari nilai x)", "bg-[#b876d6] text-black", "text-[#b876d6]");
            out(`   ${p1_rata.padEnd(panjang_maks, ' ')} | × ${Math.abs(b2)}`);
            out(`   ${p2_rata.padEnd(panjang_maks, ' ')} | × ${Math.abs(b1)}`);
            out("   " + "─".repeat(panjang_maks + 10));
            
            let p1_a_y = format_angka(a1*Math.abs(b2)), p1_b_y = format_angka(b1*Math.abs(b2)), p1_c_y = format_angka(c1*Math.abs(b2));
            let p2_a_y = format_angka(a2*Math.abs(b1)), p2_b_y = format_angka(b2*Math.abs(b1)), p2_c_y = format_angka(c2*Math.abs(b1));
            
            let operator2 = (p1_b_y === p2_b_y) ? "(-)" : "(+)";
            cetak_eliminasi_sejajar(`${p1_a_y}x ${p1_b_y >= 0 ? "+" : "-"} ${Math.abs(p1_b_y)}y`, p1_c_y, `${p2_a_y}x ${p2_b_y >= 0 ? "+" : "-"} ${Math.abs(p2_b_y)}y`, p2_c_y, operator2);
            
            let sisa_a_y = (p1_b_y === p2_b_y) ? p1_a_y - p2_a_y : p1_a_y + p2_a_y;
            let sisa_c_y = (p1_b_y === p2_b_y) ? p1_c_y - p2_c_y : p1_c_y + p2_c_y;
            
            let k2 = `${format_angka(sisa_a_y)}x`;
            let L2 = hitung_lebar(k2, "x");
            
            cetak_baris(k2, `${format_angka(sisa_c_y)}`, L2);
            cetak_pecahan_sejajar("x", format_angka(sisa_c_y), format_angka(sisa_a_y), L2);
            cetak_baris("x", `${bentuk_pecahan(sisa_c_y, sisa_a_y)}`, L2);
            
            cetak_HP(a1, b1, c1, a2, b2, c2);
        }

        // ================= METODE CAMPURAN =================
        function metode_campuran(a1, b1, c1, a2, b2, c2) {
            buatStep("1. ELIMINASI VARIABEL X (Mencari nilai y)", "bg-[#6aa4e0] text-black", "text-[#6aa4e0]");
            let tanda_b1 = b1 >= 0 ? "+" : "-";
            let tanda_b2 = b2 >= 0 ? "+" : "-";
            let kiri_p1 = percantik(`${a1}x ${tanda_b1} ${Math.abs(b1)}y`);
            let kiri_p2 = percantik(`${a2}x ${tanda_b2} ${Math.abs(b2)}y`);
            
            let L_awal = Math.max(kiri_p1.length, kiri_p2.length);
            let p1_rata = `${kiri_p1.padStart(L_awal, ' ')} = ${c1}`;
            let p2_rata = `${kiri_p2.padStart(L_awal, ' ')} = ${c2}`;
            let panjang_maks = Math.max(p1_rata.length, p2_rata.length);

            out(`   ${p1_rata.padEnd(panjang_maks, ' ')} | × ${Math.abs(a2)}`);
            out(`   ${p2_rata.padEnd(panjang_maks, ' ')} | × ${Math.abs(a1)}`);
            out("   " + "─".repeat(panjang_maks + 10));
            
            let p1_a = format_angka(a1*Math.abs(a2)), p1_b = format_angka(b1*Math.abs(a2)), p1_c = format_angka(c1*Math.abs(a2));
            let p2_a = format_angka(a2*Math.abs(a1)), p2_b = format_angka(b2*Math.abs(a1)), p2_c = format_angka(c2*Math.abs(a1));
            
            let operator1 = (p1_a === p2_a) ? "(-)" : "(+)";
            cetak_eliminasi_sejajar(`${p1_a}x ${p1_b >= 0 ? "+" : "-"} ${Math.abs(p1_b)}y`, p1_c, `${p2_a}x ${p2_b >= 0 ? "+" : "-"} ${Math.abs(p2_b)}y`, p2_c, operator1);
            
            let sisa_b = (p1_a === p2_a) ? p1_b - p2_b : p1_b + p2_b;
            let sisa_c = (p1_a === p2_a) ? p1_c - p2_c : p1_c + p2_c;
            
            let k1 = `${format_angka(sisa_b)}y`;
            let L1 = hitung_lebar(k1, "y");
            
            cetak_baris(k1, `${format_angka(sisa_c)}`, L1);
            cetak_pecahan_sejajar("y", format_angka(sisa_c), format_angka(sisa_b), L1);
            let pecahan_y = bentuk_pecahan(sisa_c, sisa_b);
            cetak_baris("y", `${pecahan_y}`, L1);
            
            buatStep("2. SUBSTITUSI NILAI 'y' KE PERSAMAAN 1", "bg-[#b876d6] text-black", "text-[#b876d6]");
            let teks_subst = `${a1}x + ${b1}(${pecahan_y}) = ${c1}`;
            out(`   ${percantik(teks_subst)}\n`);
            
            let val_x_num = c1 * sisa_b - b1 * sisa_c;
            let val_x_den = a1 * sisa_b;
            let pecahan_x = bentuk_pecahan(val_x_num, val_x_den);
            
            cetak_baris("x", `${pecahan_x}`, hitung_lebar("x"));
            
            cetak_HP(a1, b1, c1, a2, b2, c2);
        }

        // ================= METODE GRAFIK =================
        function metode_grafik(a1, b1, c1, a2, b2, c2) {
            buatStep("1. TITIK POTONG SUMBU (Tabel Koordinat)", "bg-[#6aa4e0] text-black", "text-[#6aa4e0]");
            
            let centerStr = (str, len) => str.padStart(str.length + Math.floor((len - str.length) / 2), ' ').padEnd(len, ' ');

            function jabarkan_tabel(a, b, c, nama) {
                let tanda_b = b >= 0 ? "+" : "-";
                let teks_grafik = `${a}x ${tanda_b} ${Math.abs(b)}y = ${c}`;
                out(`\n>> ${nama}: ${percantik(teks_grafik)}`);
                
                let garis_atas   = "   ┌───────────────┬───────────────┬───────────────┐";
                let garis_tengah = "   ├───────────────┼───────────────┼───────────────┤";
                let garis_bawah  = "   └───────────────┴───────────────┴───────────────┘";

                if (c === 0) {
                    out(`   - Garis melewati titik pusat (0,0).`);
                    let x_uji = b !== 0 ? b : 1;
                    let y_uji = b !== 0 ? format_angka(-a * x_uji / b) : 0;
                    
                    out("\n   Tabel Koordinat:");
                    out(garis_atas);
                    out(`   │ ${centerStr('x',13)} │ ${centerStr('0',13)} │ ${centerStr(String(x_uji),13)} │`);
                    out(garis_tengah);
                    out(`   │ ${centerStr('y',13)} │ ${centerStr('0',13)} │ ${centerStr(bentuk_pecahan(-a*x_uji, b),13)} │`);
                    out(garis_tengah);
                    out(`   │ ${centerStr('(x, y)',13)} │ ${centerStr('(0, 0)',13)} │ ${centerStr(`(${x_uji}, ${bentuk_pecahan(-a*x_uji, b)})`,13)} │`);
                    out(garis_bawah);
                } else {
                    let y_potong = b !== 0 ? bentuk_pecahan(c, b) : "-";
                    let x_potong = a !== 0 ? bentuk_pecahan(c, a) : "-";

                    let str_p1 = b !== 0 ? `(0, ${y_potong})` : "-";
                    let str_p2 = a !== 0 ? `(${x_potong}, 0)` : "-";
                    
                    out("\n   Tabel Koordinat:");
                    out(garis_atas);
                    out(`   │ ${centerStr('x',13)} │ ${centerStr('0',13)} │ ${centerStr(String(x_potong),13)} │`);
                    out(garis_tengah);
                    out(`   │ ${centerStr('y',13)} │ ${centerStr(String(y_potong),13)} │ ${centerStr('0',13)} │`);
                    out(garis_tengah);
                    out(`   │ ${centerStr('(x, y)',13)} │ ${centerStr(str_p1,13)} │ ${centerStr(str_p2,13)} │`);
                    out(garis_bawah);
                }
            }

            jabarkan_tabel(a1, b1, c1, "Garis 1 (Biru)");
            jabarkan_tabel(a2, b2, c2, "Garis 2 (Merah)");

            buatStep("2. ANALISIS GRAFIK", "bg-[#b876d6] text-black", "text-[#b876d6]");
            let D = a1 * b2 - a2 * b1;
            if (D === 0) {
                out("Garis sejajar atau berimpit, tidak ada satu titik potong pasti.");
                return;
            }

            let Dx = c1 * b2 - c2 * b1;
            let Dy = a1 * c2 - a2 * c1;
            
            out(`Berdasarkan grafik di samping/bawah, kedua garis saling berpotongan tepat di satu titik.`);
            cetak_HP(a1, b1, c1, a2, b2, c2);

            let x_float = Dx / D;
            let y_float = Dy / D;
            gambarGrafikJS(a1, b1, c1, a2, b2, c2, x_float, y_float, bentuk_pecahan(Dx, D), bentuk_pecahan(Dy, D));
        }

        // ================= FUNGSI UPDATE GARIS DINAMIS =================
        function perbaruiGaris(chart, a1, b1, c1, a2, b2, c2, x_sol, y_sol) {
            let minX = chart.scales.x.min;
            let maxX = chart.scales.x.max;
            let minY = chart.scales.y.min;
            let maxY = chart.scales.y.max;
            
            let marginX = Math.abs(maxX - minX);
            let marginY = Math.abs(maxY - minY);
            
            let x_awal = minX - marginX;
            let x_akhir = maxX + marginX;
            let y_awal = minY - marginY;
            let y_akhir = maxY + marginY;

            let cariY = (a, b, c, val_x) => (c - (a * val_x)) / b;

            if (b1 !== 0) {
                chart.data.datasets[0].data = [
                    {x: x_awal, y: cariY(a1, b1, c1, x_awal)}, 
                    {x: x_sol, y: y_sol}, 
                    {x: x_akhir, y: cariY(a1, b1, c1, x_akhir)}
                ];
            } else { 
                chart.data.datasets[0].data = [
                    {x: c1/a1, y: y_awal}, {x: c1/a1, y: y_sol}, {x: c1/a1, y: y_akhir}
                ];
            }

            if (b2 !== 0) {
                chart.data.datasets[1].data = [
                    {x: x_awal, y: cariY(a2, b2, c2, x_awal)}, 
                    {x: x_sol, y: y_sol}, 
                    {x: x_akhir, y: cariY(a2, b2, c2, x_akhir)}
                ];
            } else { 
                chart.data.datasets[1].data = [
                    {x: c2/a2, y: y_awal}, {x: c2/a2, y: y_sol}, {x: c2/a2, y: y_akhir}
                ];
            }

            chart.update('none'); 
        }

        // ================= GAMBAR GRAFIK (CHART.JS dengan INFINITE ZOOM) =================
        function gambarGrafikJS(a1, b1, c1, a2, b2, c2, x_sol, y_sol, str_x, str_y) {
            let box = document.getElementById('grafik-box');
            box.classList.remove('hidden');

            let ctx = document.getElementById('grafikCanvas').getContext('2d');
            if(myChart) myChart.destroy();

            let view_rentang = 15;
            let x_min = Math.floor(x_sol) - view_rentang;
            let x_max = Math.ceil(x_sol) + view_rentang;

            let cariY = (a, b, c, val_x) => (c - (a * val_x)) / b;
            
            let dataGaris1 = b1 !== 0 
                ? [{x: x_min, y: cariY(a1, b1, c1, x_min)}, {x: x_sol, y: y_sol}, {x: x_max, y: cariY(a1, b1, c1, x_max)}] 
                : [{x: c1/a1, y: y_sol-view_rentang}, {x: c1/a1, y: y_sol}, {x: c1/a1, y: y_sol+view_rentang}];
                
            let dataGaris2 = b2 !== 0 
                ? [{x: x_min, y: cariY(a2, b2, c2, x_min)}, {x: x_sol, y: y_sol}, {x: x_max, y: cariY(a2, b2, c2, x_max)}] 
                : [{x: c2/a2, y: y_sol-view_rentang}, {x: c2/a2, y: y_sol}, {x: c2/a2, y: y_sol+view_rentang}];

            Chart.defaults.color = '#9ca3af';
            Chart.defaults.font.family = 'Inter';

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: [
                        { label: 'Persamaan 1', data: dataGaris1, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', borderWidth: 3, pointRadius: 0, tension: 0 },
                        { label: 'Persamaan 2', data: dataGaris2, borderColor: '#f43f5e', backgroundColor: 'rgba(244, 63, 94, 0.1)', borderWidth: 3, pointRadius: 0, tension: 0 },
                        { label: `HP: (${str_x}, ${str_y})`, data: [{x: x_sol, y: y_sol}], backgroundColor: '#10b981', borderColor: '#ffffff', borderWidth: 3, pointRadius: 7, pointHoverRadius: 10, type: 'scatter' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { labels: { color: '#f3f4f6', font: { weight: 'bold' }, padding: 20 } },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { size: 14 },
                            bodyFont: { size: 14, weight: 'bold' },
                            padding: 12,
                            borderColor: '#374151',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    if(context.datasetIndex === 2) return ` Titik Potong: (${str_x}, ${str_y})`;
                                    return ` ${context.dataset.label} (x: ${context.parsed.x.toFixed(1)}, y: ${context.parsed.y.toFixed(1)})`;
                                }
                            }
                        },
                        zoom: {
                            pan: { 
                                enabled: true, 
                                mode: 'xy', 
                                threshold: 10,
                                onPan: function({chart}) {
                                    perbaruiGaris(chart, a1, b1, c1, a2, b2, c2, x_sol, y_sol);
                                }
                            },
                            zoom: { 
                                wheel: { enabled: true, speed: 0.1 }, 
                                pinch: { enabled: true }, 
                                mode: 'xy',
                                onZoom: function({chart}) {
                                    perbaruiGaris(chart, a1, b1, c1, a2, b2, c2, x_sol, y_sol);
                                }
                            }
                        }
                    },
                    scales: { 
                        x: { 
                            type: 'linear', 
                            min: x_sol - view_rentang, max: x_sol + view_rentang,
                            grid: { color: (ctx) => ctx.tick.value === 0 ? 'rgba(255, 255, 255, 0.6)' : 'rgba(55, 65, 81, 0.4)', lineWidth: (ctx) => ctx.tick.value === 0 ? 2 : 1 }
                        }, 
                        y: { 
                            type: 'linear', 
                            min: y_sol - view_rentang, max: y_sol + view_rentang,
                            grid: { color: (ctx) => ctx.tick.value === 0 ? 'rgba(255, 255, 255, 0.6)' : 'rgba(55, 65, 81, 0.4)', lineWidth: (ctx) => ctx.tick.value === 0 ? 2 : 1 }
                        } 
                    }
                }
            });
        }

        // ================= PROGRAM UTAMA =================
        function jalankanKalkulator() {
            // Reset UI
            resetSteps();
            document.getElementById('grafik-box').classList.add('hidden');
            let hasilContainer = document.getElementById('hasil-container');
            
            hasilContainer.classList.remove('animate-fade-in');
            void hasilContainer.offsetWidth; 
            hasilContainer.classList.add('animate-fade-in');

            if(myChart) myChart.destroy();

            // Ambil Input
            let a1 = parseFloat(document.getElementById('a1').value) || 0;
            let b1 = parseFloat(document.getElementById('b1').value) || 0;
            let c1 = parseFloat(document.getElementById('c1').value) || 0;
            let a2 = parseFloat(document.getElementById('a2').value) || 0;
            let b2 = parseFloat(document.getElementById('b2').value) || 0;
            let c2 = parseFloat(document.getElementById('c2').value) || 0;
            
            let pilihan = document.querySelector('input[name="metode"]:checked').value;

            // Step 0: Tampilkan data diketahui
            buatStep("0. DIKETAHUI", "bg-[#5a5a5a] text-white", "text-gray-300");
            cetak_persamaan(format_angka(a1), format_angka(b1), format_angka(c1), 1);
            cetak_persamaan(format_angka(a2), format_angka(b2), format_angka(c2), 2);
            
            let D = a1 * b2 - a2 * b1;
            if (D === 0) {
                buatStep("KESIMPULAN", "bg-[#df6e77] text-black", "text-[#df6e77]");
                out("⚠️ Peringatan: Determinan = 0");
                out("Kedua garis ini sejajar (tidak ada solusi) atau berimpit (solusi tak hingga).");
            } else {
                if (pilihan === '1') metode_substitusi(a1, b1, c1, a2, b2, c2);
                else if (pilihan === '2') metode_eliminasi(a1, b1, c1, a2, b2, c2);
                else if (pilihan === '3') metode_campuran(a1, b1, c1, a2, b2, c2);
                else if (pilihan === '4') metode_grafik(a1, b1, c1, a2, b2, c2);
            }

            // Render ke HTML
            renderSteps();
            hasilContainer.classList.remove('hidden');
        }
    </script>
